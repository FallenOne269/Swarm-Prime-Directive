AWSTemplateFormatVersion: "2010-09-09"
Description: "Swarm Prime Directive — ECS Fargate deployment for recursive improvement cycles"

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  
  AnthropicApiKeyArn:
    Type: String
    Description: "ARN of the Secrets Manager secret containing the Anthropic API key"
  
  CyclesPerRun:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 100
  
  FocusArea:
    Type: String
    Default: "general capability improvement"
  
  ScheduleExpression:
    Type: String
    Default: "rate(6 hours)"
    Description: "CloudWatch Events schedule for automatic runs (set to 'none' to disable)"

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]

  Cpu:
    Type: String
    Default: "512"
    AllowedValues: ["256", "512", "1024"]

  Memory:
    Type: String
    Default: "1024"
    AllowedValues: ["512", "1024", "2048", "4096"]

Conditions:
  EnableSchedule: !Not [!Equals [!Ref ScheduleExpression, "none"]]

Resources:

  # ── ECR Repository ───────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "swarm-prime-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: swarm-prime
        - Key: Environment
          Value: !Ref Environment

  # ── VPC (minimal — public subnets only for Fargate) ──────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "swarm-prime-vpc-${Environment}"

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # ── Security Group ───────────────────────────────────────────────────────
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Swarm Prime Fargate tasks — egress only"
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: "HTTPS to Anthropic API"

  # ── ECS Cluster ──────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "swarm-prime-${Environment}"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: swarm-prime

  # ── IAM Roles ────────────────────────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "swarm-prime-exec-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AnthropicApiKeyArn

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "swarm-prime-task-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3OutputAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt OutputBucket.Arn
                  - !Sub "${OutputBucket.Arn}/*"

  # ── S3 Output Bucket ────────────────────────────────────────────────────
  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "swarm-prime-output-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      Tags:
        - Key: Project
          Value: swarm-prime

  # ── CloudWatch Log Group ─────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/swarm-prime-${Environment}"
      RetentionInDays: 30

  # ── ECS Task Definition ──────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "swarm-prime-${Environment}"
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: swarm-prime
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}:latest"
          Essential: true
          Command:
            - "run"
            - "--cycles"
            - !Sub "${CyclesPerRun}"
            - "--focus"
            - !Ref FocusArea
            - "--log-level"
            - !Ref LogLevel
            - "--output"
            - "/app/swarm_output"
          Environment:
            - Name: SWARM_LOG_LEVEL
              Value: !Ref LogLevel
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Ref AnthropicApiKeyArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: swarm
          HealthCheck:
            Command: ["CMD-SHELL", "python -c 'from swarm_prime.orchestrator import SwarmOrchestrator; print(\"ok\")'"]
            Interval: 60
            Timeout: 10
            Retries: 3

  # ── EventBridge Scheduled Rule ───────────────────────────────────────────
  ScheduleRole:
    Type: AWS::IAM::Role
    Condition: EnableSchedule
    Properties:
      RoleName: !Sub "swarm-prime-schedule-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref TaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt TaskRole.Arn

  ScheduledRule:
    Type: AWS::Events::Rule
    Condition: EnableSchedule
    Properties:
      Name: !Sub "swarm-prime-schedule-${Environment}"
      Description: "Scheduled Swarm Prime improvement cycles"
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: SwarmPrimeTask
          Arn: !GetAtt ECSCluster.Arn
          RoleArn: !GetAtt ScheduleRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref TaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                AssignPublicIp: ENABLED
                SecurityGroups: [!Ref TaskSecurityGroup]
                Subnets:
                  - !Ref PublicSubnetA
                  - !Ref PublicSubnetB

Outputs:
  ECRRepositoryUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}"
    Export:
      Name: !Sub "swarm-prime-ecr-uri-${Environment}"

  ClusterName:
    Value: !Ref ECSCluster

  TaskDefinitionArn:
    Value: !Ref TaskDefinition

  OutputBucketName:
    Value: !Ref OutputBucket

  RunTaskCommand:
    Description: "CLI command to run a cycle on-demand"
    Value: !Sub |
      aws ecs run-task \
        --cluster ${ECSCluster} \
        --task-definition ${TaskDefinition} \
        --launch-type FARGATE \
        --network-configuration "awsvpcConfiguration={subnets=[${PublicSubnetA},${PublicSubnetB}],securityGroups=[${TaskSecurityGroup}],assignPublicIp=ENABLED}"
