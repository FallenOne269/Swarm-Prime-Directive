name: Swarm Prime CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of improvement cycles to run"
        required: false
        default: "1"
      focus:
        description: "Focus area for improvement"
        required: false
        default: "general capability improvement"
      deploy:
        description: "Deploy to ECS after build"
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: swarm-prime-prod
  ECS_CLUSTER: swarm-prime-prod

permissions:
  contents: read
  id-token: write  # For OIDC auth to AWS

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Ruff lint
        run: ruff check swarm_prime/

      - name: Ruff format check
        run: ruff format --check swarm_prime/

      - name: MyPy type check
        run: mypy swarm_prime/ --ignore-missing-imports

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Build & Push Docker Image ────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to ECS (manual trigger or on main push) ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true') ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition
        id: update-task
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition swarm-prime-prod \
            --query 'taskDefinition' \
            --output json)

          # Update image to latest
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ needs.build.outputs.image_tag }}" \
            '.containerDefinitions[0].image = ($IMAGE | split(",") | .[0])')

          # Register new revision (strip fields ECS doesn't accept)
          echo $NEW_TASK_DEF | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > /tmp/new-task-def.json

          aws ecs register-task-definition --cli-input-json file:///tmp/new-task-def.json

      - name: Run improvement cycle
        if: github.event_name == 'workflow_dispatch'
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition swarm-prime-prod \
            --launch-type FARGATE \
            --network-configuration "$(aws cloudformation describe-stacks \
              --stack-name swarm-prime-prod \
              --query 'Stacks[0].Outputs[?OutputKey==`RunTaskCommand`].OutputValue' \
              --output text | grep -oP 'awsvpcConfiguration=\{[^}]+\}')" \
            --overrides '{
              "containerOverrides": [{
                "name": "swarm-prime",
                "command": ["run", "--cycles", "${{ github.event.inputs.cycles }}", "--focus", "${{ github.event.inputs.focus }}"]
              }]
            }'

  # ── On-Demand Cycle Run (workflow_dispatch only) ─────────────────────────
  run-cycle:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install .

      - name: Run improvement cycles
        run: |
          swarm-prime run \
            --cycles ${{ github.event.inputs.cycles }} \
            --focus "${{ github.event.inputs.focus }}" \
            --output swarm_output \
            --log-level INFO
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload cycle output
        uses: actions/upload-artifact@v4
        with:
          name: swarm-output-${{ github.run_number }}
          path: swarm_output/
          retention-days: 30
